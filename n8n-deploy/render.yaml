# ==============================================================================
#          CONFIGURACIÓN DE BLUEPRINT RENDER PARA DESPLEGAR N8N EN LA NUBE
# ==============================================================================
services:
  - type: web
    name: mi-n8n-nube
    env: docker # Indica a Render que use el Dockerfile del repositorio
    plan: free # Usa el plan gratuito de Render
    envVars:
      - key: N8N_PORT
        value: 10000 # Puerto requerido por Render
      - key: N8N_ENCRYPTION_KEY
        sync: false # Pide una clave de cifrado al usuario al desplegar
        description: "Una clave de seguridad inventada por ti para proteger tus credenciales"
