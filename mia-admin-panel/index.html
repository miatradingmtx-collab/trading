<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIA Admin Panel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MIA Admin">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="glass-header">
        <div class="header-content">
            <div class="logo">
                <div class="pulsing-dot"></div>
                <h1>MIA <span class="badge">GOD MODE</span></h1>
            </div>
            <div class="status-bar">
                <span class="status-text">SYSTEM ONLINE</span>
            </div>
        </div>
    </header>

    <main id="chat-container">
    </main>

    <!-- Botpress Webchat -->
    <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                // Fetch de la configuración V3 que nos dio Botpress
                const configUrl = "https://files.bpcontent.cloud/2026/06/20/03/20260620030216-POYEAGGJ.json";
                const response = await fetch(configUrl);
                const configData = await response.json();

                // Forzamos nuestros propios estilos por encima de la configuración
                configData.themeName = "prism";
                configData.themeColor = "#00f2fe";
                configData.hideWidget = false;
                configData.disableAnimations = false;
                configData.composerPlaceholder = "Habla con Mia...";
                configData.hostUrl = "https://cdn.botpress.cloud/webchat/v1";
                configData.messagingUrl = "https://messaging.botpress.cloud";

                window.botpressWebChat.init(configData);

                // Forzar que se abra el chat automáticamente
                window.botpressWebChat.onEvent(function (event) {
                    if (event.type === 'LIFECYCLE.LOADED') {
                        window.botpressWebChat.sendEvent({ type: 'show' });
                    }
                }, ['LIFECYCLE.LOADED']);
            } catch (err) {
                console.error("Error cargando Mia:", err);
            }
        });
    </script>
</body>
</html>
